# This topology boots with pallet_execution_guard::MigrationHalt=true staged at genesis so the PB-MIGRATION guardian recovery path is live (SQ-274; 09 §3.2).
# Bleavit local drill topology — 15 §4.7; 02 §8/§11; 09 §7.1.
[settings]
provider = "native"
# Zombienet timeouts are converted to 32-bit signed milliseconds, so any value
# above 2,147,483 s silently overflows (observed: 6,000,000 s collapsed to a
# 1 ms watchdog on the first G1 execution). The long-soak drill bounds live in
# per-step `within` clauses (each ≤ 2,000,000 s); this global value only guards
# network operations.
timeout = 1000
node_spawn_timeout = 240

[relaychain]
chain = "paseo-local"
chain_spec_path = "zombienet/specs/out/paseo-local.json"
default_command = "zombienet/bin/polkadot"
default_args = ["--no-hardware-benchmarks"]

[[relaychain.nodes]]
name = "relay-alice"
validator = true

[[relaychain.nodes]]
name = "relay-bob"
validator = true

[[relaychain.nodes]]
name = "relay-charlie"
validator = true

[[relaychain.nodes]]
name = "relay-dave"
validator = true

# Zombienet has no auxiliary-process stanza. This non-validator node entry
# gives the real B9 keeper a managed PID and Prometheus endpoint so drill 03's
# native SIGSTOP/SIGCONT controls target the daemon itself.
[[relaychain.nodes]]
name = "keeper"
validator = false
command = "zombienet/scripts/keeper-node.sh"
substrate_cli_args_version = 2
prometheus_prefix = "bleavit"
args = ["--keeper-node-url=ws://127.0.0.1:19944", "--keeper-signer-uri=//Alice"]

[[parachains]]
id = 4242
chain_spec_path = "zombienet/specs/out/bleavit-drill-migration.json"
cumulus_based = true

[[parachains.collators]]
name = "bleavit-collator-1"
command = "target/release/bleavit-node"
rpc_port = 19944

[[parachains.collators]]
name = "bleavit-collator-2"
command = "target/release/bleavit-node"

[[parachains.collators]]
name = "bleavit-collator-3"
command = "target/release/bleavit-node"
